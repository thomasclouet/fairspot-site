<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoindre une session FairSpot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAFAF8;
      color: #1C1C1E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      font-size: 40px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: #6E6E6E;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .code-box {
      background: #F2F2F7;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
    }
    .code-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .code-value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #1C1C1E;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-primary {
      background: #FF6B3D;
      color: white;
    }
    .btn-secondary {
      background: #F2F2F7;
      color: #1C1C1E;
    }
    .store-links {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .store-links a {
      flex: 1;
      display: block;
      padding: 13px;
      border-radius: 12px;
      background: #1C1C1E;
      color: white;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
    }
    .divider {
      font-size: 12px;
      color: #C7C7CC;
      margin: 20px 0 16px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🗺️</div>
  <h1>Rejoins la session</h1>
  <p class="subtitle" id="subtitle">Quelqu'un t'invite à trouver le meilleur point de rencontre en transports en commun.</p>

  <div class="code-box" id="code-box" style="display:none">
    <div class="code-label">Code session</div>
    <div class="code-value" id="code-display"></div>
  </div>

  <a class="btn btn-primary" id="btn-open" href="#" style="display:none">
    Ouvrir dans FairSpot
  </a>

  <div class="divider">Tu n'as pas encore FairSpot ?</div>

  <div class="store-links">
    <a href="https://apps.apple.com/fr/app/fairspot/id6760891842" target="_blank">📱 App Store</a>
    <a href="https://play.google.com/store/apps/details?id=com.meetpoint.meetpoint" target="_blank">🤖 Google Play</a>
  </div>
</div>

<script>
  // Lire le code depuis l'URL (?code=XXXX)
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code && /^[A-Z0-9]{4}$/i.test(code)) {
    const upperCode = code.toUpperCase();

    // Afficher le code
    document.getElementById('code-box').style.display = 'block';
    document.getElementById('code-display').textContent = upperCode;
    document.getElementById('subtitle').textContent =
      'Entre ce code dans FairSpot pour rejoindre la session et entrer ton adresse de départ.';

    // Lien deep link vers l'app
    const deepLink = 'fairspot://session?code=' + upperCode;
    const btn = document.getElementById('btn-open');
    btn.style.display = 'block';
    btn.href = deepLink;

    // Tenter d'ouvrir l'app automatiquement sur mobile
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      setTimeout(() => { window.location.href = deepLink; }, 300);
    }
  }
</script>
</body>
</html>
